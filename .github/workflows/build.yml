name: Build and Release pybar

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g., v1.0.0) - optional for builds'
        required: false
        type: string

jobs:
  build-arch:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm python python-pip base-devel openssl git \
          libgirepository gtk4 python-gobject cairo python-cairo pkgconf zip \
          gtk4-layer-shell

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          source venv/bin/activate
          pip install pyinstaller

      - name: Write version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ github.event.inputs.tag_name }}" > VERSION
          else
            echo "${GITHUB_REF#refs/tags/}" > VERSION
          fi

      - name: Build binary
        run: |
          source venv/bin/activate
          pyinstaller pybar.spec

      - name: Upload Arch Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pybar-archlinux
          path: dist/pybar

  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:25.10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt update
          apt install -y libgirepository-2.0-dev libgtk-4-dev \
          libatk1.0-dev openssl zip libgtk4-layer-shell-dev python3 \
          python3-pip python3-venv git

      - name: Create virtual environment
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python3 -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          . venv/bin/activate
          pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          . venv/bin/activate
          pip install pyinstaller

      - name: Write version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ github.event.inputs.tag_name }}" > VERSION
          else
            echo "${GITHUB_REF#refs/tags/}" > VERSION
          fi

      - name: Build binary
        run: |
          . venv/bin/activate
          pyinstaller pybar.spec

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: pybar-ubuntu
          path: dist/pybar

  package-deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: pybar-ubuntu
          path: ./artifacts/ubuntu

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Fall back to short commit hash for untagged runs
          if [ -z "${TAG}" ]; then
            TAG="0~$(echo ${GITHUB_SHA} | cut -c1-7)"
          fi
          # Strip leading 'v' for the deb version field
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Assemble deb package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG=pybar_${VERSION}_amd64
          # Create directory layout
          mkdir -p ${PKG}/opt/pybar
          mkdir -p ${PKG}/DEBIAN

          # Copy the full onedir bundle
          cp -r ./artifacts/ubuntu/. ${PKG}/opt/pybar/
          chmod +x ${PKG}/opt/pybar/pybar

          # control file - use printf to avoid heredoc YAML issues
          printf 'Package: pybar\n' > ${PKG}/DEBIAN/control
          printf 'Version: %s\n' "${VERSION}" >> ${PKG}/DEBIAN/control
          printf 'Architecture: amd64\n' >> ${PKG}/DEBIAN/control
          printf 'Maintainer: thnikk\n' >> ${PKG}/DEBIAN/control
          printf 'Depends: libgtk4-layer-shell0\n' >> ${PKG}/DEBIAN/control
          printf 'Description: pybar GTK4 status bar\n' >> ${PKG}/DEBIAN/control

          # postinst: create /usr/bin symlink
          printf '#!/bin/sh\nset -e\nln -sf /opt/pybar/pybar /usr/bin/pybar\n' \
            > ${PKG}/DEBIAN/postinst
          chmod 0755 ${PKG}/DEBIAN/postinst

          # prerm: remove /usr/bin symlink
          printf '#!/bin/sh\nset -e\nrm -f /usr/bin/pybar\n' \
            > ${PKG}/DEBIAN/prerm
          chmod 0755 ${PKG}/DEBIAN/prerm

          dpkg-deb --build ${PKG}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pybar-deb
          path: pybar_${{ steps.version.outputs.version }}_amd64.deb

  release:
    needs: [build-arch, build, package-deb]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.tag_name != '')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Arch Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pybar-archlinux
          path: ./artifacts/archlinux

      - name: Download Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: pybar-ubuntu
          path: ./artifacts/ubuntu

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: pybar-deb
          path: ./artifacts/deb

      - name: Create zip archives
        run: |
          cd artifacts/archlinux
          zip -r ../pybar-arch.zip *
          cd ../ubuntu
          zip -r ../pybar-ubuntu.zip *
          cd ..

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the tag name
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 \
            "${TAG_NAME}^" 2>/dev/null || echo "")

          # Generate changelog
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..${TAG_NAME} \
              --pretty=format:"* %s (%h)" >> notes.md
          else
            echo "## Initial Release" > notes.md
          fi

          echo "" >> notes.md
          echo "## Downloads" >> notes.md
          echo "" >> notes.md
          echo "* \`pybar-arch.zip\` - Arch Linux build" >> notes.md
          echo "* \`pybar-ubuntu.zip\` - Ubuntu build" >> notes.md
          echo "* \`pybar_*_amd64.deb\` - Debian/Ubuntu package" >> notes.md

      - name: Check if pre-release
        id: prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          if echo "$TAG_NAME" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          body_path: notes.md
          files: |
            ./artifacts/pybar-arch.zip
            ./artifacts/pybar-ubuntu.zip
            ./artifacts/deb/*.deb
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
